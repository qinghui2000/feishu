<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营销中心服务商整改通知书</title>
    <style>
        /* A4 纸张页面排版质感样式 */
        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
        }

        .a4-container {
            width: 850px;
            min-height: 1100px;
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            padding: 60px 80px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            color: #000000;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 固定列宽，防止变形 */
            margin-bottom: 25px;
        }

        th, td {
            border: 1px solid #000000;
            font-size: 15px;
            height: 45px;
            padding: 10px 12px;
            box-sizing: border-box;
            word-wrap: break-word; /* 允许长文本自动断行 */
            vertical-align: middle;
        }

        .label-bg {
            background-color: #ffffff;
            text-align: center;
            font-weight: 500;
            width: 15%; 
        }

        /* 关键：给动态长文本区域加样式，保留飞书的换行与空格 */
        .dynamic-text {
            text-align: left;
            line-height: 1.6;
            white-space: pre-wrap; /* 保留飞书里的换行符 \n */
            color: #333333;
        }

        .center-text {
            text-align: center;
            color: #333333;
        }

        /* 下方下划线区域 */
        .penalty-section {
            font-size: 15px;
            line-height: 2.2;
            color: #000000;
            margin-top: 15px;
        }

        .penalty-item {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-end;
        }

        .penalty-label {
            white-space: nowrap;
        }

        .underline-space {
            flex-grow: 1;
            border-bottom: 1px solid #000000;
            margin-left: 10px;
            padding-left: 15px;
            color: #333333;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="a4-container">
        <h1>福州营销中心服务商整改通知书</h1>

        <table>
            <tr>
                <td class="label-bg">服务商名称</td>
                <td colspan="2" class="center-text" data-field="serviceName"></td>
                <td class="label-bg">服务商编码</td>
                <td colspan="2" class="center-text" data-field="serviceCode"></td>
            </tr>
            <tr>
                <td class="label-bg">服务商负责人</td>
                <td colspan="2" class="center-text" data-field="manager"></td>
                <td class="label-bg">联系电话</td>
                <td colspan="2" class="center-text" data-field="managerPhone"></td>
            </tr>
            <tr>
                <td class="label-bg">整改原因</td>
                <td colspan="5" class="dynamic-text" data-field="reason"></td>
            </tr>
            <tr>
                <td class="label-bg">整改目标<br>(指标/业务)</td>
                <td colspan="5" class="dynamic-text" data-field="target"></td>
            </tr>
            <tr>
                <td class="label-bg">整改时间</td>
                <td colspan="5" class="center-text">
                    <span id="start-date-span">2026年05月16日</span>
                    &nbsp;——&nbsp;
                    <span id="end-date-span" style="font-weight: bold;">2026年05月16日</span>
                </td>
            </tr>
            <tr>
                <td class="label-bg">督办联系人</td>
                <td colspan="2" class="center-text" data-field="supervisor"></td>
                <td class="label-bg">联系电话</td>
                <td colspan="2" class="center-text" data-field="supervisorPhone"></td>
            </tr>
        </table>

        <div class="penalty-section">
            <div style="font-weight: bold; margin-bottom: 15px;">贵司如在整改期限内未能达成整改目标，营销中心将采取如下措施：</div>
            
            <div class="penalty-item">
                <span class="penalty-label">调整区域：</span>
                <div class="underline-space" data-field="adjustArea"></div>
            </div>
            <div class="penalty-item">
                <span class="penalty-label">调整业务：</span>
                <div class="underline-space" data-field="adjustBusiness"></div>
            </div>
            <div class="penalty-item">
                <span class="penalty-label">停止派工：</span>
                <div class="underline-space" data-field="stopDispatch"></div>
            </div>
            <div class="penalty-item">
                <span class="penalty-label">淘汰处理：</span>
                <div class="underline-space" data-field="eliminateProcess"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. 飞书 URL 参数映射表
        const paramMap = {
            'p': 'serviceName',       // 服务商名称
            'o': 'serviceCode',       // 服务商编码
            'm': 'manager',           // 服务商负责人
            'mp': 'managerPhone',     // 联系电话
            'r': 'reason',            // 整改原因
            't': 'target',            // 整改目标
            's': 'supervisor',        // 督办联系人
            'sp': 'supervisorPhone'   // 督办联系电话
        };

        function initNotificationPage() {
            const urlParams = new URLSearchParams(window.location.search);

            // A. 解析并填充所有文字字段
            for (const [paramKey, dataField] of Object.entries(paramMap)) {
                const rawValue = urlParams.get(paramKey);
                
                if (rawValue !== null) {
                    // 解码飞书传过来的 URL 编码字符（如将 %E8%8E%86 还原为中文）
                    const decodedValue = decodeURIComponent(rawValue).trim();
                    
                    if (decodedValue !== "") {
                        // 寻找 HTML 中带有 data-field 属性的单元格
                        const element = document.querySelector(`[data-field="${dataField}"]`);
                        if (element) {
                            // 针对原因和目标，自动将文本换行符 \n 替换为网页可视的 <br> 标签
                            if (dataField === 'reason' || dataField === 'target') {
                                element.innerHTML = decodedValue.replace(/\n/g, '<br>');
                            } else {
                                element.textContent = decodedValue;
                            }
                        }
                    }
                }
            }

            // B. 针对“整改时间（d）”进行智能日期转换
            const deadlineRaw = urlParams.get('d');
            if (deadlineRaw) {
                const dateStr = decodeURIComponent(deadlineRaw).trim();
                const dateParts = dateStr.split('-');
                
                // 如果是飞书多维表传过来的标准 2026-06-11 格式，将其格式化为中文大写格式
                if (dateParts.length === 3) {
                    const year = dateParts[0];
                    const month = parseInt(dateParts[1], 10);
                    const day = parseInt(dateParts[2], 10);
                    
                    const formattedEndDate = `${year}年${month < 10 ? '0' + month : month}月${day < 10 ? '0' + day : day}日`;
                    
                    const endDateContainer = document.getElementById('end-date-span');
                    if (endDateContainer) {
                        endDateContainer.textContent = formattedEndDate;
                    }
                } else {
                    // 备用：如果不是标准横杠格式，则直接原样填充
                    document.getElementById('end-date-span').textContent = dateStr;
                }
            }
        }

        // 确保页面骨架加载完成后立刻执行脚本
        document.addEventListener('DOMContentLoaded', initNotificationPage);
    </script>
</body>
</html>
