<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营销中心服务商整改通知书</title>
    <style>
        /* CSS 样式：打造专业公文质感 */
        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
        }

        /* A4 纸张容器容器 */
        .a4-container {
            width: 850px;
            min-height: 1100px;
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            padding: 60px 80px;
            box-sizing: border-box;
        }

        /* 标题样式 */
        h1 {
            text-align: center;
            font-size: 26px;
            color: #000000;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* 表格基础样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 固定列宽 */
            margin-bottom: 25px;
        }

        th, td {
            border: 1px solid #000000;
            font-size: 15px;
            height: 45px;
            padding: 10px 12px;
            box-sizing: border-box;
            word-wrap: break-word; /* 允许长文本自动断行 */
            vertical-align: middle;
        }

        /* 灰色条纹标题栏 */
        .label-bg {
            background-color: #ffffff;
            text-align: center;
            font-weight: 500;
            width: 15%; /* 默认标签列宽 */
        }

        /* 多行动态文本专属样式 */
        .dynamic-text {
            text-align: left;
            line-height: 1.6;
            white-space: pre-wrap; /* 核心：完美保留飞书多维表的换行、空格 */
            color: #333333;
        }

        /* 占位符提示样式 */
        .placeholder {
            color: #aaaaaa;
            font-style: italic;
        }

        /* 居中显示的数据列 */
        .center-text {
            text-align: center;
            color: #333333;
        }

        /* 下方下划线处罚条款区域 */
        .penalty-section {
            font-size: 15px;
            line-height: 2.2;
            color: #000000;
            margin-top: 15px;
        }

        .penalty-item {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-end;
        }

        .penalty-label {
            white-space: nowrap;
        }

        .underline-space {
            flex-grow: 1;
            border-bottom: 1px solid #000000;
            margin-left: 10px;
            padding-left: 15px;
            color: #333333;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="a4-container">
        <h1>福州营销中心服务商整改通知书</h1>

        <table>
            <tr>
                <td class="label-bg">服务商名称</td>
                <td colspan="2" class="center-text" data-field="serviceName"><span class="placeholder">正在加载服务商名称...</span></td>
                <td class="label-bg">服务商编码</td>
                <td colspan="2" class="center-text" data-field="serviceCode"><span class="placeholder">正在加载编码...</span></td>
            </tr>
            <tr>
                <td class="label-bg">服务商负责人</td>
                <td colspan="2" class="center-text" data-field="manager"><span class="placeholder">正在加载负责人...</span></td>
                <td class="label-bg">联系电话</td>
                <td colspan="2" class="center-text" data-field="managerPhone"><span class="placeholder">正在加载电话...</span></td>
            </tr>
            <tr>
                <td class="label-bg">整改原因</td>
                <td colspan="5" class="dynamic-text" data-field="reason"><span class="placeholder">请输入整改原因</span></td>
            </tr>
            <tr>
                <td class="label-bg">整改目标<br>(指标/业务)</td>
                <td colspan="5" class="dynamic-text" data-field="target"><span class="placeholder">请输入整改目标（可多行）</span></td>
            </tr>
            <tr>
                <td class="label-bg">整改时间</td>
                <td colspan="5" class="center-text">
                    <span id="start-date-span">2026年05月16日</span>
                    &nbsp;——&nbsp;
                    <span id="end-date-span" style="font-weight: bold;"><span class="placeholder">2026年05月16日</span></span>
                </td>
            </tr>
            <tr>
                <td class="label-bg">督办联系人</td>
                <td colspan="2" class="center-text" data-field="supervisor"><span class="placeholder">请输入督办联系人</span></td>
                <td class="label-bg">联系电话</td>
                <td colspan="2" class="center-text" data-field="supervisorPhone"><span class="placeholder">请输入联系电话</span></td>
            </tr>
        </table>

        <div class="penalty-section">
            <div style="font-weight: bold; margin-bottom: 15px;">贵司如在整改期限内未能达成整改目标，营销中心将采取如下措施：</div>
            
            <div class="penalty-item">
                <span class="penalty-label">调整区域：</span>
                <div class="underline-space" data-field="adjustArea"></div>
            </div>
            <div class="penalty-item">
                <span class="penalty-label">调整业务：</span>
                <div class="underline-space" data-field="adjustBusiness"></div>
            </div>
            <div class="penalty-item">
                <span class="penalty-label">停止派工：</span>
                <div class="underline-space" data-field="stopDispatch"></div>
            </div>
            <div class="penalty-item">
                <span class="penalty-label">淘汰处理：</span>
                <div class="underline-space" data-field="eliminateProcess"></div>
            </div>
        </div>
    </div>

    <script>
        /* ========== 1. 飞书 URL 参数映射表 ========== */
        const paramMap = {
            'p': 'serviceName',       // 服务商名称
            'o': 'serviceCode',       // 服务商编码
            'm': 'manager',           // 服务商负责人
            'mp': 'managerPhone',     // 联系电话
            'r': 'reason',            // 整改原因
            't': 'target',            // 整改目标
            's': 'supervisor',        // 督办联系人
            'sp': 'supervisorPhone'   // 督办联系电话
        };

        /* ========== 2. 页面初始化填充逻辑 ========== */
        function initNotificationPage() {
            // 获取 URL 传参
            const urlParams = new URLSearchParams(window.location.search);

            // A. 循环解析常规字段
            for (const [paramKey, dataField] of Object.entries(paramMap)) {
                const rawValue = urlParams.get(paramKey);
                
                if (rawValue !== null) {
                    // 解码防止中文乱码
                    const decodedValue = decodeURIComponent(rawValue).trim();
                    
                    if (decodedValue !== "") {
                        const element = document.querySelector(`[data-field="${dataField}"]`);
                        if (element) {
                            // 使用 innerHTML 以便自动转换换行符（主要是原因和目标）
                            element.innerHTML = decodedValue.replace(/\n/g, '<br>');
                        }
                    }
                }
            }

            // B. 特殊处理“整改结束日期（deadline）”
            const deadlineRaw = urlParams.get('d');
            if (deadlineRaw) {
                const dateStr = decodeURIComponent(deadlineRaw).trim();
                // 预期格式为 YYYY-MM-DD，进行拆分转换
                const dateParts = dateStr.split('-');
                if (dateParts.length === 3) {
                    const year = dateParts[0];
                    const month = parseInt(dateParts[1], 10); // 去除前导0，如 06 变成 6
                    const day = parseInt(dateParts[2], 10);   // 去除前导0
                    
                    // 格式化为：XXXX年XX月XX日
                    const chineseFormatDate = `${year}年${month < 10 ? '0' + month : month}月${day < 10 ? '0' + day : day}日`;
                    
                    const endDateContainer = document.getElementById('end-date-span');
                    if (endDateContainer) {
                        endDateContainer.textContent = chineseFormatDate;
                    }
                } else {
                    // 如果传过来的格式不是标准横杠分隔，则直接原样展示
                    document.getElementById('end-date-span').textContent = dateStr;
                }
            }
        }

        // 确保在 DOM 树加载完成后执行
        document.addEventListener('DOMContentLoaded', initNotificationPage);
    </script>
</body>
</html>
